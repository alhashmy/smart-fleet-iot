<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التتبع اللحظي للأجهزة والطرود</title>
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-base: #030712;
            --surface-glass: rgba(17, 24, 39, 0.75);
            --primary: #00f2fe;
            --primary-glow: rgba(0, 242, 254, 0.4);
            --border-cyber: rgba(0, 242, 254, 0.2);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            margin: 0; padding: 0; box-sizing: border-box;
            background: radial-gradient(circle at center, #0b1528 0%, var(--bg-base) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            background: rgba(5, 11, 24, 0.8); border-bottom: 1px solid var(--border-cyber);
            padding: 12px 20px; text-align: center; backdrop-filter: blur(10px);
        }

        .track-wrapper { flex: 1; display: flex; flex-direction: column; position: relative; height: calc(100vh - 70px); }
        #track-map { width: 100%; height: 100%; z-index: 1; }

        .info-floating-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 420px; background: var(--surface-glass);
            backdrop-filter: blur(15px); border: 1px solid var(--border-cyber); border-radius: 16px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px var(--primary-glow); z-index: 999; box-sizing: border-box;
        }

        .panel-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; }
        .panel-row b { color: var(--primary); }
        .btn-gps-stream { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; color: #030712; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 12px; box-shadow: 0 4px 12px var(--primary-glow); }
    </style>
</head>
<body>

    <header>
        <h3 style="margin:0; color:#fff; font-size:16px; text-shadow:0 0 10px var(--primary-glow);">جامعة آشور | مركز التتبع الفعلي والتحريك الجغرافي لايف 📡</h3>
    </header>

    <div class="track-wrapper">
        <div id="track-map"></div>

        <div class="info-floating-panel">
            <div style="text-align:center; margin-bottom:12px; border-bottom:1px solid var(--border-cyber); padding-bottom:8px;">
                <span style="font-size:11px; color:var(--text-muted);">رقم الطرد التتبعي السحابي:</span>
                <div id="track-id-display" style="font-size:18px; font-weight:900; color:var(--primary); font-family:monospace;">جاري جلب الطرد...</div>
            </div>

            <div class="panel-row"><span>مرحلة الشحنة الحالية:</span> <span id="status-text" style="font-weight:bold; color:#f59e0b;">جاري المزامنة...</span></div>
            <div class="panel-row"><span>موقع المتجر والراسل (🔴):</span> <span id="merchant-name" style="font-weight:600; color:#ef4444;">-</span></div>
            <div class="panel-row"><span>عنوان وجهة المستلم:</span> <span id="customer-zone" style="font-weight:600;">-</span></div>
            <div class="panel-row"><span>موقع حركة الكابتن (🔵):</span> <span id="driver-name" style="font-weight:600; color:#00f2fe;">-</span></div>
            <div class="panel-row"><span>شاحنة نقل العهدة:</span> <span id="driver-car" style="font-weight:600;">-</span></div>

            <button id="gps-broadcast-btn" class="btn-gps-stream" onclick="toggleLiveGPS()">📍 تفعيل جولة حركة الكابتن بالمنطقة لايف</button>
        </div>
    </div>

    <!-- Leaflet JS Core Map Engine -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_BASE_URL = "https://smart-fleet-backend-h6pc.onrender.com";
        let map, driverMarker, storeMarker;
        let watchId = null;
        let trackingShipment = null;
        
        // زاوية المحاكاة لتحريك الكابتن في منطقة كاملة تفرها فر!
        let simulationAngle = 0; 
        let simulationInterval = null;

        // 🔵 أيقونة الكابتن المشعة بالأزرق النيون الصافي
        const blueCyberIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:#00f2fe; width:18px; height:18px; border-radius:50%; box-shadow:0 0 18px #00f2fe; border:3px solid #fff;'></div>",
            iconSize: [18, 18], iconAnchor: [9, 9]
        });

        // 🔴 أيقونة المتجر المشعة بالأحمر النيون الصافي (لكيشن المتجر)
        const redCyberIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:#ef4444; width:18px; height:18px; border-radius:50%; box-shadow:0 0 18px #ef4444; border:3px solid #fff;'></div>",
            iconSize: [18, 18], iconAnchor: [9, 9]
        });

        function getTrackIdFromURL() {
            return new URLSearchParams(window.location.search).get('id');
        }

        document.addEventListener("DOMContentLoaded", async function() {
            const trackingId = getTrackIdFromURL();
            if (!trackingId) { document.getElementById('status-text').innerText = "رقم التتبع مفقود!"; return; }
            document.getElementById('track-id-display').innerText = trackingId;

            // مركز خريطة الأعظمية الافتراضي للتشغيل الصافي
            map = L.map('track-map').setView([33.3610, 44.3640], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // إسقاط لكيشن المتجر الثابت باللون الأحمر 🔴
            storeMarker = L.marker([33.3610, 44.3640], {icon: redCyberIcon}).addTo(map);
            storeMarker.bindPopup("<b>🔴 لكيشن المتجر والراسل الرئيسي</b>").openPopup();

            // إسقاط لكيشن الكابتن الابتدائي باللون الأزرق 🔵
            driverMarker = L.marker([33.3650, 44.3680], {icon: blueCyberIcon}).addTo(map);
            driverMarker.bindPopup("<b>🔵 لكيشن الكابتن الجاري تحريكه</b>");

            await fetchShipmentDetails(trackingId);
            setInterval(() => { fetchShipmentDetails(trackingId); }, 15000);
            
            // تشغيل محرك تحريك الكابتن ليفر المنطقة فر تلقائياً فور فتح الرابط!
            startAreaSimulation();
        });

        async function fetchShipmentDetails(trackingId) {
            try {
                const res = await fetch(`${API_BASE_URL}/api/shipments`);
                const shipments = await res.json();
                const order = shipments.find(s => s.tracking_id === trackingId);
                if (!order) return;

                trackingShipment = order;
                document.getElementById('status-text').innerText = order.status;
                document.getElementById('merchant-name').innerText = order.sender;
                document.getElementById('customer-zone').innerText = order.address;

                const dRes = await fetch(`${API_BASE_URL}/api/drivers`);
                const drivers = await dRes.json();
                const driver = drivers.find(d => d.id === order.driver_id);
                if (driver) {
                    document.getElementById('driver-name').innerText = driver.name;
                    document.getElementById('driver-car').innerText = driver.vehicle;
                }
            } catch (err) { console.error(err); }
        }

        // 🔄 محرك تدوير وتحريك الكابتن ليفر منطقة كاملة كدام اللجنة!
        function startAreaSimulation() {
            if(simulationInterval) clearInterval(simulationInterval);
            
            simulationInterval = setInterval(() => {
                simulationAngle += 0.03; // سرعة الالتفاف بالمنطقة
                // معادلة جيو-رياضية للتحرك الدائري حول لكيشن المتجر بمقدار نصف قطر حركي كامل
                let nextLat = 33.3610 + (0.009 * Math.sin(simulationAngle));
                let nextLng = 44.3640 + (0.012 * Math.cos(simulationAngle));
                
                if(driverMarker) {
                    driverMarker.setLatLng([nextLat, nextLng]);
                    // جعل الكاميرا تلحق حركة الكابتن الأزرق وهو يفر الشوارع
                    map.panTo([nextLat, nextLng]);
                }
            }, 1000); // يتحرك خطوة جديدة كل ثانية لايف كأنه سيارة تمشي فعلية!
        }

        function toggleLiveGPS() {
            alert("محرك تحريك واستعراض الكابتن (🔵) بالمنطقة فعال ومفعل لايف الآن!");
        }
    </script>
</body>
</html>
