<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART ROUTE - لوحة تتبع الأسطول السيبرانية</title>
    
    <!-- خط القاهرة للتصميم الاحترافي -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- مكتبة الخرائط العالمية Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --cyber-blue: #38bdf8;
            --cyber-yellow: #f59e0b;
            --cyber-green: #10b981;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 992px) {
            .dashboard-container {
                grid-template-columns: 380px 1fr;
            }
            .header-panel {
                grid-column: span 2;
            }
        }

        /* تصميم الـ Glassmorphism التكتيكي */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(56, 189, 248, 0.2);
            padding-bottom: 15px;
            margin-bottom: 10px;
        }

        .header-panel h1 {
            font-size: 24px;
            margin: 0;
            font-weight: 700;
            color: var(--cyber-blue);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .system-status {
            font-size: 14px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--cyber-green);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* حاوية الخريطة */
        #track-map {
            height: 600px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        /* عناصر الاستمارات المدخلة */
        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 10px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--cyber-blue);
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.2);
        }

        /* الأزرار الملونة الهوية */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-blue {
            background: var(--cyber-blue);
            color: #0f172a;
        }

        .btn-blue:hover {
            background: #7dd3fc;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .btn-yellow {
            background: var(--cyber-yellow);
            color: #0f172a;
            margin-bottom: 15px;
        }

        .btn-yellow:hover {
            background: #fbbf24;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
        }

        /* تفاصيل الشحنة والكابتن */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .info-item {
            background: rgba(15, 23, 42, 0.4);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .info-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .info-value {
            font-size: 14px;
            font-weight: 600;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- الهيدر الرئيسي للمنظومة -->
        <div class="glass-panel header-panel">
            <h1>SMART ROUTE // لوحة تتبع الأسطول الذكي</h1>
            <div class="system-status">● النظام متصل بالخادم لايف</div>
        </div>

        <!-- القائمة الجانبية: التحكم والبيانات -->
        <div class="glass-panel" style="display: flex; flex-direction: column; gap: 15px;">
            
            <!-- مشاركة موقع المتجر -->
            <div>
                <button class="btn btn-yellow" id="share-merchant-loc-btn" onclick="shareMerchantLocation()">
                    📍 مشاركة موقع المتجر (تثبيت البث بالأصفر)
                </button>
            </div>

            <!-- واجهة تفاصيل التتبع الفعلي -->
            <div style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;">
                <h3 style="margin: 0 0 10px 0; font-size: 16px; color: var(--cyber-blue);">📦 حالة الشحنة الفورية</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">رقم التتبع</div>
                        <div class="info-value" id="track-id-display">--</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">حالة الشحنة</div>
                        <div class="info-value" id="status-text" style="color: var(--cyber-green);">جاري جلبها...</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">المتجر المرسل</div>
                        <div class="info-value" id="merchant-name">--</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">عنوان الزبون</div>
                        <div class="info-value" id="customer-zone">--</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">اسم الكابتن</div>
                        <div class="info-value" id="driver-name">--</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">العجلة / المركبة</div>
                        <div class="info-value" id="driver-car">--</div>
                    </div>
                </div>
            </div>

            <!-- استمارة إضافة كابتن جديد -->
            <div style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;">
                <h3 style="margin: 0 0 12px 0; font-size: 16px; color: var(--cyber-blue);">➕ إنشاء كابتن جديد بالنظام</h3>
                <form id="driver-form" onsubmit="createNewDriver(event)">
                    <div class="form-group">
                        <label>اسم الكابتن الكامل:</label>
                        <input type="text" id="new-driver-name" class="form-control" required placeholder="مثال: يوسف صلاح">
                    </div>
                    <div class="form-group">
                        <label>رقم هاتف الكابتن:</label>
                        <input type="tel" id="new-driver-phone" class="form-control" required placeholder="07xxxxxxxxx">
                    </div>
                    <div class="form-group">
                        <label>السكن / المحافظة:</label>
                        <input type="text" id="new-driver-city" class="form-control" required placeholder="بغداد - الأعظمية">
                    </div>
                    <div class="form-group">
                        <label>العنوان التفصيلي:</label>
                        <input type="text" id="new-driver-address" class="form-control" required placeholder="المحلة / الزقاق">
                    </div>
                    <div class="form-group">
                        <label>الكود المرجعي الفريد (ID):</label>
                        <input type="text" id="new-driver-ref" class="form-control" required placeholder="مثال: DRV-505">
                    </div>
                    <div class="form-group">
                        <label>رفع صورة الكابتن الشخصية:</label>
                        <input type="file" id="new-driver-photo" class="form-control" accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-blue" style="margin-top: 10px;">حفظ الكابتن الجديد في السيرفر</button>
                </form>
            </div>

        </div>

        <!-- حاوية الخريطة الجغرافية -->
        <div class="glass-panel">
            <div id="track-map"></div>
        </div>

    </div>

    <!-- مكتبة الخرائط Leaflet.js JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // النطاق الموحد لسيرفر ريندر الخاص بك
        const API_BASE_URL = "https://smart-fleet-backend-h6pc.onrender.com";
        let map, driverMarker, merchantMarker;
        let trackingShipment = null;

        // تهيئة الأيقونات الملونة لهوية المشروع الرسمية (كابتن أزرق - متجر أصفر)
        const blueIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        const yellowIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-yellow.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        // دالة استخراج الـ ID مالت الشحنة من الرابط تلقائياً
        function getTrackIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // تشغيل المنظومة عند اكتمال تحميل الصفحة
        document.addEventListener("DOMContentLoaded", async function() {
            const trackingId = getTrackIdFromURL();
            
            // بناء الخريطة وتثبيت الإحداثيات الأولية على بغداد
            map = L.map('track-map').setView([33.3152, 44.3661], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            // ماركر الكابتن الابتدائي (باللون الأزرق)
            driverMarker = L.marker([33.3152, 44.3661], {icon: blueIcon}).addTo(map);

            if (!trackingId) {
                document.getElementById('status-text').innerText = "❌ خطأ: لم يتم تمرير id بالرابط!";
                return;
            }
            
            document.getElementById('track-id-display').innerText = trackingId;

            // استدعاء فوري للبيانات
            await fetchShipmentDetails(trackingId);
            
            // نبض المزامنة المتزامن (كل 15 ثانية لجلب التحديثات من قاعدة البيانات من دون عمل refresh)
            setInterval(() => { 
                fetchShipmentDetails(trackingId); 
            }, 15000); 
        });

        // دالة إنشاء كابتن جديد وإرسال البيانات للسيرفر
        async function createNewDriver(event) {
            event.preventDefault();
            
            const name = document.getElementById('new-driver-name').value;
            const phone = document.getElementById('new-driver-phone').value;
            const city = document.getElementById('new-driver-city').value;
            const address = document.getElementById('new-driver-address').value;
            const driverId = document.getElementById('new-driver-ref').value;

            const driverData = {
                id: driverId,
                name: name,
                phone: phone,
                city: city,
                address: address,
                status: "active",
                lat: 33.3152, 
                lng: 44.3661
            };

            try {
                const res = await fetch(`${API_BASE_URL}/api/drivers`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(driverData)
                });
                
                if(res.ok) {
                    alert("✅ تم تسجيل وإنشاء الكابتن الجديد بنجاح في قاعدة البيانات!");
                    document.getElementById('driver-form').reset();
                } else {
                    alert("❌ حدث خطأ أثناء الحفظ بالسيرفر، تأكد من صحة الحقول.");
                }
            } catch (err) {
                console.error("Error network post:", err);
                alert("❌ فشل الاتصال بالـ Backend.");
            }
        }

        // دالة مشاركة موقع المتجر الفعلي عبر الـ GPS وتثبيته باللون الأصفر
        function shareMerchantLocation() {
            if (!navigator.geolocation) {
                alert("متصفحك الحالي لا يدعم ميزة تحديد الموقع الجغرافي GPS!");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;

                // تحديث أو بناء ماركر المتجر باللون الأصفر التكتيكي
                if (merchantMarker) {
                    merchantMarker.setLatLng([lat, lng]);
                } else {
                    merchantMarker = L.marker([lat, lng], {icon: yellowIcon}).addTo(map);
                }
                merchantMarker.bindPopup("🏬 موقع المتجر الرسمي (تم البث مشاركة لايف)").openPopup();
                map.setView([lat, lng], 14);

                // رفع الإحداثيات المحدثة للسيرفر
                try {
                    await fetch(`${API_BASE_URL}/api/merchants/location`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lat: lat, lng: lng })
                    });
                    alert("📍 تم مشاركة وتثبيت إحداثيات المتجر الحالية بنجاح!");
                } catch (err) {
                    console.error("Error update merchant:", err);
                }
            }, () => {
                alert("فشل التقاط إحداثيات المتجر، يرجى تفعيل صلاحية الوصول للموقع في المتصفح.");
            }, { enableHighAccuracy: true });
        }

        // دالة جلب تفاصيل الشحنة ومحاكاة دقة الحركة الدائرية للكباتن
        async function fetchShipmentDetails(trackingId) {
            try {
                const res = await fetch(`${API_BASE_URL}/api/shipments`);
                const shipments = await res.json();
                const order = shipments.find(s => s.tracking_id === trackingId);

                if (!order) {
                    document.getElementById('status-text').innerText = "الشحنة غير متوفرة.";
                    return;
                }

                trackingShipment = order;
                document.getElementById('status-text').innerText = order.status;
                document.getElementById('merchant-name').innerText = order.sender;
                document.getElementById('customer-zone').innerText = order.address;

                const driversRes = await fetch(`${API_BASE_URL}/api/drivers`);
                const drivers = await driversRes.json();
                const driver = drivers.find(d => d.id === order.driver_id);

                if (driver) {
                    document.getElementById('driver-name').innerText = driver.name;
                    document.getElementById('driver-car').innerText = driver.vehicle || "دراجة نارية";

                    let lat = Number(driver.lat);
                    let lng = Number(driver.lng);

                    // ======= تحسين دقة محاكاة حركة الكباتن في مسار دائري (نصف قطر نصف كيلومتر) =======
                    // نستخدم التوقيت اللحظي لخلق زاوية دوران سلسة ومستمرة في النبضات
                    const timestamp = new Date().getTime() / 4000; 
                    const radiusInKm = 0.5; // نصف كيلو متر بالضبط
                    
                    // تحويل الإزاحة بالكيلومترات إلى درجات جغرافية دقيقة تعتمد على إحداثيات الموقع الحالي
                    const deltaLat = (radiusInKm / 6371) * (180 / Math.PI);
                    const deltaLng = (radiusInKm / 6371) * (180 / Math.PI) / Math.cos(lat * Math.PI / 180);

                    // حساب الموقع المحدث على المحيط الدائري باستخدام جيب وجيب تمام الزاوية اللحظية
                    const smoothLat = lat + deltaLat * Math.sin(timestamp);
                    const smoothLng = lng + deltaLng * Math.cos(timestamp);

                    // تحديث ماركر الكابتن الأزرق على الإحداثيات الانسيابية المحدثة
                    driverMarker.setLatLng([smoothLat, smoothLng]);
                    driverMarker.setIcon(blueIcon); 
                    
                    driverMarker.bindPopup(`🏍️ الكابتن: ${driver.name}<br>تتبع حي ودقيق بمسار مسافته نصف كيلو`).openPopup();
                }
            } catch (err) {
                console.error("Error loading tracking heartbeat data:", err);
            }
        }
    </script>
</body>
</html>
